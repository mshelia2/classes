<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌤 Weather App</h1>

    <p>Search for any city in the world</p>

    <input
        type="text"
        id="cityInput"
        placeholder="Enter city name">

    <button id="searchBtn">
        Get Weather
    </button>

    <div id="weatherCard">

        <h2 id="cityName"></h2>

        <h1 id="temperature"></h1>

        <p id="description"></p>

        <p id="humidity"></p>

        <p id="wind"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
