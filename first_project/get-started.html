<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelivan | Get Started</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <a href="home.html" class="logo">
        <span class="logo-icon"><i class="fas fa-gem"></i></span>
        <span>
          <span class="logo-main">Shelivan</span>
          <span class="logo-sub">Premium Wealth</span>
        </span>
      </a>

      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="transfer.html">Transfer</a></li>
        <li><a href="testimonials.html">Testimonials</a></li>
      </ul>

      <div class="nav-actions">
        <a class="btn btn-ghost" href="signin.html">Sign In</a>
        <a class="btn btn-gold active" href="get-started.html">Get Started</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Create Account</span>
        <h2>Start Your <span class="gold-text">Premium Journey</span></h2>
      </div>

      <form class="form-box">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Alexandra Voss" />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="+234..." />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a password" />
        </div>

        <button class="btn btn-gold" type="button" style="width: 100%;">Get Started</button>
      </form>
    </div>
  </main>

</body>
</html>
