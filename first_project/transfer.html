<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelivan | Transfer</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container nav-container">
      <a href="home.html" class="logo">
        <span class="logo-icon"><i class="fas fa-gem"></i></span>
        <span>
          <span class="logo-main">Shelivan</span>
          <span class="logo-sub">Premium Wealth</span>
        </span>
      </a>

      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="features.html">Features</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a class="active" href="transfer.html">Transfer</a></li>
        <li><a href="testimonials.html">Testimonials</a></li>
      </ul>

      <div class="nav-actions">
        <a class="btn btn-ghost" href="signin.html">Sign In</a>
        <a class="btn btn-gold" href="get-started.html">Get Started</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Transfer</span>
        <h2>Send Money <span class="gold-text">Anywhere</span></h2>
        <p>Make secure transfers with a simple and clean form.</p>
      </div>

      <form class="form-box">
        <div class="form-group">
          <label>Recipient Name</label>
          <input type="text" placeholder="Marcus Johnson" />
        </div>

        <div class="form-group">
          <label>Account Number</label>
          <input type="text" placeholder="0091 3456 7891" />
        </div>

        <div class="form-group">
          <label>Select Bank</label>
          <select>
            <option>GTBank</option>
            <option>Zenith Bank</option>
            <option>Access Bank</option>
            <option>First Bank</option>
            <option>UBA</option>
          </select>
        </div>

        <div class="form-group">
          <label>Amount</label>
          <input type="number" placeholder="$0.00" />
        </div>

        <div class="form-group">
          <label>Narration</label>
          <input type="text" placeholder="Optional message" />
        </div>

        <button class="btn btn-gold" type="button" style="width: 100%;">
          Proceed to Confirm
        </button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Shelivan Premium Wealth. All rights reserved.</div>
  </footer>

</body>
</html>
